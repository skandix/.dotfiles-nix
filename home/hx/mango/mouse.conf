accel_profile=0 # no to accell
accel_speed=0.0
mouse_natural_scrolling=0


mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
#mousebind=SUPER,btn_middle,togglemaxmizescreen,0
# mousebind=SUPER+CTRL,btn_right,killclient # wtf, kill window on mouse, thats even more crazy than mod+c

# Overview mode (Hycov-style — see all windows). Mouse-only in overview:
# In overview, left-click jumps to a window, right-click closes it.
mousebind=NONE,btn_left,toggleoverview,-1
mousebind=NONE,btn_right,killclient,0

# swipe throug active workspace with scrooll wheeel fancy :notbad:
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# fooorrtyytwoooo
env=XCURSOR_SIZE,42
